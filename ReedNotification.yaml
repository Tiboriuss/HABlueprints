blueprint:
  name: Türkontakt → Benachrichtigung (ntfy + Telegram)
  description: >
    Sendet eine Benachrichtigung wenn ein Tür-/Fensterkontakt geöffnet oder
    geschlossen wird. ntfy und Telegram sind beide optional und unabhängig
    voneinander aktivierbar.
  domain: automation
  input:
    door_sensor:
      name: Tür-/Fensterkontakt (Reed)
      description: Wähle den Zigbee Tür-/Fensterkontakt aus.
      selector:
        entity:
          domain: binary_sensor

    name:
      name: Name für die Benachrichtigung
      description: Dieser Name wird in der Nachricht verwendet.
      default: Tür
      selector:
        text: {}

    ntfy_enabled:
      name: ntfy aktivieren
      description: Benachrichtigung über ntfy senden.
      default: true
      selector:
        boolean: {}

    ntfy_device:
      name: ntfy Gerät
      description: Wähle das ntfy Gerät/Topic (nur relevant wenn ntfy aktiviert).
      default: ""
      selector:
        device:
          integration: ntfy

    telegram_enabled:
      name: Telegram aktivieren
      description: Benachrichtigung über Telegram senden.
      default: false
      selector:
        boolean: {}

    telegram_entity:
      name: Telegram Notify-Entität
      description: Wähle die Telegram-Notify-Entität (nur relevant wenn Telegram aktiviert).
      default: ""
      selector:
        entity:
          domain: notify

mode: restart

variables:
  notif_name: !input name
  use_ntfy: !input ntfy_enabled
  use_telegram: !input telegram_enabled
  telegram_target: !input telegram_entity

trigger:
  - platform: state
    entity_id: !input door_sensor
    from: "off"
    to: "on"
    id: opened
  - platform: state
    entity_id: !input door_sensor
    from: "on"
    to: "off"
    id: closed

action:
  - choose:
      - conditions:
          - condition: trigger
            id: opened
        sequence:
          - if:
              - condition: template
                value_template: "{{ use_ntfy }}"
            then:
              - service: ntfy.publish
                target:
                  device_id: !input ntfy_device
                data:
                  title: "{{ notif_name }}"
                  message: "{{ notif_name }} wurde geöffnet"
          - if:
              - condition: template
                value_template: "{{ use_telegram and telegram_target != '' }}"
            then:
              - service: notify.send_message
                target:
                  entity_id: "{{ telegram_target }}"
                data:
                  message: "{{ notif_name }} wurde geöffnet"
      - conditions:
          - condition: trigger
            id: closed
        sequence:
          - if:
              - condition: template
                value_template: "{{ use_ntfy }}"
            then:
              - service: ntfy.publish
                target:
                  device_id: !input ntfy_device
                data:
                  title: "{{ notif_name }}"
                  message: "{{ notif_name }} wurde geschlossen"
          - if:
              - condition: template
                value_template: "{{ use_telegram and telegram_target != '' }}"
            then:
              - service: notify.send_message
                target:
                  entity_id: "{{ telegram_target }}"
                data:
                  message: "{{ notif_name }} wurde geschlossen"