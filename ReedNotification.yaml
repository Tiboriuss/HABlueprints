blueprint:
  name: Türkontakt → ntfy Benachrichtigung
  description: >
    Sendet eine ntfy-Benachrichtigung, wenn ein Tür-/Fensterkontakt geöffnet
    oder geschlossen wird. Nachricht verwendet den konfigurierten Namen.
  domain: automation
  input:
    door_sensor:
      name: Tür-/Fensterkontakt (Reed)
      description: Wähle den Zigbee Tür-/Fensterkontakt aus.
      selector:
        entity:
          domain: binary_sensor

    name:
      name: Name für die Benachrichtigung
      description: Dieser Name ersetzt %NAME% in der Nachricht.
      default: Tür
      selector:
        text: {}

    ntfy_topic:
      name: ntfy Topic
      description: Topic, an das ntfy.publish senden soll.
      selector:
        text: {}

mode: restart

variables:
  notif_name: !input name
  ntfy_topic: !input ntfy_topic

trigger:
  - platform: state
    entity_id: !input door_sensor
    from: "off"
    to: "on"
    id: opened
  - platform: state
    entity_id: !input door_sensor
    from: "on"
    to: "off"
    id: closed

action:
  - choose:
      - conditions:
          - condition: trigger
            id: opened
        sequence:
          - service: ntfy.publish
            data:
              topic: "{{ ntfy_topic }}"
              message: "{{ notif_name }} wurde geöffnet"
      - conditions:
          - condition: trigger
            id: closed
        sequence:
          - service: ntfy.publish
            data:
              topic: "{{ ntfy_topic }}"
              message: "{{ notif_name }} wurde geschlossen"